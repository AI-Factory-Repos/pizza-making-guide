<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Making Guide</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main>
    <!--
      YouTube Embed Component
      To embed a video, call createYouTubeEmbed() from main.js with:
        - a container element
        - a valid 11-character YouTube video ID
        - optional { title, caption } options

      Example usage is shown below. Replace the videoId value with any real
      YouTube video ID to display the player.
    -->
    <section id="video-section" aria-label="Pizza Making Video">
      <div id="pizza-video"></div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script>
    // Example: embed a YouTube video into #pizza-video
    // Replace 'dQw4w9WgXcQ' with the desired YouTube video ID.
    createYouTubeEmbed(
      document.getElementById('pizza-video'),
      'dQw4w9WgXcQ',
      {
        title: 'How to Make Pizza',
        caption: 'Watch our step-by-step pizza making guide.'
      }
    );
  </script>

</body>
</html>
